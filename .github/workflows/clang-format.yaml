name: Lint
on:
  pull_request:
    types: [labeled]

jobs:
  lint:
    if: ${{ github.event.label.name == 'lint' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jidicula/clang-format-action@v4.13.0
        with:
          clang-format-version: "17"
          fallback-style: "Chromium"
